<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">DELF B2 exam flow</title>
  <desc id="desc">A simple process diagram for DELF B2 preparation and exam day.</desc>
  <rect width="1200" height="520" fill="#f5f7fa"/>
  <rect x="70" y="76" width="1060" height="368" fill="#ffffff" stroke="#dfe3ea" stroke-width="2" rx="10"/>
  <text x="100" y="132" fill="#0055a4" font-family="Georgia, serif" font-size="34" font-weight="700">DELF B2 · Parcours</text>
  <g font-family="Arial, sans-serif">
    <g transform="translate(110 190)">
      <rect width="190" height="120" fill="#ffffff" stroke="#0055a4" stroke-width="3" rx="8"/>
      <text x="26" y="48" fill="#181818" font-size="24" font-weight="700">1. 诊断</text>
      <text x="26" y="82" fill="#62666d" font-size="18">四项能力定位</text>
    </g>
    <g transform="translate(355 190)">
      <rect width="190" height="120" fill="#ffffff" stroke="#0055a4" stroke-width="3" rx="8"/>
      <text x="26" y="48" fill="#181818" font-size="24" font-weight="700">2. 专项</text>
      <text x="26" y="82" fill="#62666d" font-size="18">听读写说训练</text>
    </g>
    <g transform="translate(600 190)">
      <rect width="190" height="120" fill="#ffffff" stroke="#0055a4" stroke-width="3" rx="8"/>
      <text x="26" y="48" fill="#181818" font-size="24" font-weight="700">3. 模拟</text>
      <text x="26" y="82" fill="#62666d" font-size="18">限时完成任务</text>
    </g>
    <g transform="translate(845 190)">
      <rect width="190" height="120" fill="#0055a4" stroke="#0055a4" stroke-width="3" rx="8"/>
      <text x="26" y="48" fill="#ffffff" font-size="24" font-weight="700">4. 考试</text>
      <text x="26" y="82" fill="#ffffff" font-size="18">流程与心态</text>
    </g>
    <path d="M310 250h34" stroke="#0055a4" stroke-width="4" stroke-linecap="round"/>
    <path d="M333 238l12 12-12 12" fill="none" stroke="#0055a4" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M555 250h34" stroke="#0055a4" stroke-width="4" stroke-linecap="round"/>
    <path d="M578 238l12 12-12 12" fill="none" stroke="#0055a4" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M800 250h34" stroke="#0055a4" stroke-width="4" stroke-linecap="round"/>
    <path d="M823 238l12 12-12 12" fill="none" stroke="#0055a4" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="100" y="382" fill="#62666d" font-family="Arial, sans-serif" font-size="20">用同一套知识库连接官方信息、老师经验和学生复盘。</text>
</svg>
