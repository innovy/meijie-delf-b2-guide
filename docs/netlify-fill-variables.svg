<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900">
  <rect width="1200" height="900" fill="#f6f7f9"/>
  <rect x="70" y="55" width="1060" height="790" rx="24" fill="#fff" stroke="#dfe3ea" stroke-width="3"/>
  <text x="110" y="120" fill="#111827" font-size="38" font-family="Arial, Helvetica, sans-serif" font-weight="700">Netlify：Add variable 里这样填</text>
  <text x="110" y="158" fill="#6b7280" font-size="21" font-family="Arial, Helvetica, sans-serif">每次添加一个变量。下面 4 行要分 4 次添加。</text>
  <rect x="110" y="205" width="980" height="95" rx="16" fill="#fff5f5" stroke="#fa2d30" stroke-width="4"/>
  <text x="142" y="247" fill="#b9151a" font-size="24" font-family="Arial, Helvetica, sans-serif" font-weight="700">Variable name / Key</text>
  <text x="142" y="282" fill="#111827" font-size="28" font-family="Arial, Helvetica, sans-serif" font-weight="700">ADMIN_PASSWORD</text>
  <text x="520" y="247" fill="#b9151a" font-size="24" font-family="Arial, Helvetica, sans-serif" font-weight="700">Value</text>
  <text x="520" y="282" fill="#111827" font-size="25" font-family="Arial, Helvetica, sans-serif">你自己设置的后台密码</text>
  <rect x="110" y="330" width="980" height="95" rx="16" fill="#f9fafb" stroke="#dfe3ea" stroke-width="2"/>
  <text x="142" y="372" fill="#374151" font-size="24" font-family="Arial, Helvetica, sans-serif" font-weight="700">Variable name / Key</text>
  <text x="142" y="407" fill="#111827" font-size="28" font-family="Arial, Helvetica, sans-serif" font-weight="700">GITHUB_REPO</text>
  <text x="520" y="372" fill="#374151" font-size="24" font-family="Arial, Helvetica, sans-serif" font-weight="700">Value</text>
  <text x="520" y="407" fill="#111827" font-size="25" font-family="Arial, Helvetica, sans-serif">GitHub用户名/仓库名</text>
  <text x="808" y="407" fill="#6b7280" font-size="21" font-family="Arial, Helvetica, sans-serif">例：meijie/delf-b2-wiki</text>
  <rect x="110" y="455" width="980" height="95" rx="16" fill="#f9fafb" stroke="#dfe3ea" stroke-width="2"/>
  <text x="142" y="497" fill="#374151" font-size="24" font-family="Arial, Helvetica, sans-serif" font-weight="700">Variable name / Key</text>
  <text x="142" y="532" fill="#111827" font-size="28" font-family="Arial, Helvetica, sans-serif" font-weight="700">GITHUB_BRANCH</text>
  <text x="520" y="497" fill="#374151" font-size="24" font-family="Arial, Helvetica, sans-serif" font-weight="700">Value</text>
  <text x="520" y="532" fill="#111827" font-size="25" font-family="Arial, Helvetica, sans-serif">main</text>
  <text x="600" y="532" fill="#6b7280" font-size="21" font-family="Arial, Helvetica, sans-serif">通常填 main；如果仓库默认分支叫 master，就填 master</text>
  <rect x="110" y="580" width="980" height="95" rx="16" fill="#f9fafb" stroke="#dfe3ea" stroke-width="2"/>
  <text x="142" y="622" fill="#374151" font-size="24" font-family="Arial, Helvetica, sans-serif" font-weight="700">Variable name / Key</text>
  <text x="142" y="657" fill="#111827" font-size="28" font-family="Arial, Helvetica, sans-serif" font-weight="700">GITHUB_TOKEN</text>
  <text x="520" y="622" fill="#374151" font-size="24" font-family="Arial, Helvetica, sans-serif" font-weight="700">Value</text>
  <text x="520" y="657" fill="#111827" font-size="25" font-family="Arial, Helvetica, sans-serif">GitHub 复制出来的 github_pat_... 那串</text>
  <rect x="110" y="720" width="980" height="70" rx="16" fill="#111827"/>
  <text x="142" y="764" fill="#fff" font-size="24" font-family="Arial, Helvetica, sans-serif" font-weight="700">Scopes / 作用范围：如果看到选项，就选 All scopes；没有就保持默认。</text>
  <text x="142" y="820" fill="#6b7280" font-size="19" font-family="Arial, Helvetica, sans-serif">添加完 4 个变量后，去 Deploys 里 Trigger deploy，重新部署一次。</text>
</svg>
